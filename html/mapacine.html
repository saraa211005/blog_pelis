    <script>
        function crearMapa(id, lat, lon, text) {
           
            let map = L.map(id).setView([lat, lon], 15);

            /*Per carregar les cel·les del mapa*/
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: '&copy; OpenStreetMap'}).addTo(map);

            /*Marcador Pop-up per a indicar quin cine és aquell*/
            L.marker([lat, lon]).addTo(map)
            .bindPopup(text) // Al clicar surt el nom del cinema
            .openPopup();
        }

        // Coordenades del cinema (lat, long)
            crearMapa('map', 41.13962, 1.2173, '<b>OCINE Gavarres</b>');
    </script>
